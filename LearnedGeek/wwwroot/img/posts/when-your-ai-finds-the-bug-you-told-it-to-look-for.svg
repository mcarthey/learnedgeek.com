<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6a4f"/>
      <stop offset="100%" style="stop-color:#1b4332"/>
    </linearGradient>
    <linearGradient id="mobileGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6930c3"/>
      <stop offset="100%" style="stop-color:#4a1d8e"/>
    </linearGradient>
    <linearGradient id="okGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d6a4f"/>
      <stop offset="100%" style="stop-color:#40916c"/>
    </linearGradient>
    <linearGradient id="warnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#c1121f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- API Server Box -->
  <rect x="50" y="80" width="220" height="290" rx="12" fill="url(#apiGrad)" opacity="0.9"/>
  <rect x="50" y="80" width="220" height="40" rx="12" fill="#40916c" opacity="0.3"/>
  <text x="160" y="106" text-anchor="middle" fill="#a7f3d0" font-family="monospace" font-size="14" font-weight="bold">API Server</text>

  <!-- API sends these fields -->
  <text x="70" y="145" fill="#a7f3d0" font-family="monospace" font-size="11">sends:</text>
  <text x="75" y="168" fill="#d8f3dc" font-family="monospace" font-size="11">EventsProcessed</text>
  <text x="75" y="188" fill="#d8f3dc" font-family="monospace" font-size="11">UpdatedWorkOrders</text>
  <text x="75" y="208" fill="#d8f3dc" font-family="monospace" font-size="11">SyncTimestamp</text>
  <text x="75" y="228" fill="#d8f3dc" font-family="monospace" font-size="11">FailedEventIds</text>
  <text x="75" y="248" fill="#d8f3dc" font-family="monospace" font-size="11">Success</text>

  <!-- Status code badge -->
  <rect x="85" y="280" width="150" height="35" rx="6" fill="url(#okGrad)" opacity="0.9"/>
  <text x="160" y="302" text-anchor="middle" fill="#fff" font-family="monospace" font-size="16" font-weight="bold">200 OK</text>
  <text x="160" y="340" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="10" opacity="0.7">"Everything's fine!"</text>

  <!-- Mobile App Box -->
  <rect x="530" y="80" width="220" height="290" rx="12" fill="url(#mobileGrad)" opacity="0.9"/>
  <rect x="530" y="80" width="220" height="40" rx="12" fill="#7c3aed" opacity="0.3"/>
  <text x="640" y="106" text-anchor="middle" fill="#ddd6fe" font-family="monospace" font-size="14" font-weight="bold">Mobile App</text>

  <!-- Mobile expects these fields -->
  <text x="550" y="145" fill="#c4b5fd" font-family="monospace" font-size="11">expects:</text>
  <text x="555" y="168" fill="#ede9fe" font-family="monospace" font-size="11">ProcessedEventIds</text>
  <text x="555" y="188" fill="#ede9fe" font-family="monospace" font-size="11">WorkOrders</text>
  <text x="555" y="208" fill="#ede9fe" font-family="monospace" font-size="11">ServerTime</text>
  <text x="555" y="228" fill="#ede9fe" font-family="monospace" font-size="11" opacity="0.4">FailedEventIds</text>
  <text x="555" y="248" fill="#ede9fe" font-family="monospace" font-size="11" opacity="0.4">Success</text>

  <!-- Pending queue -->
  <rect x="565" y="275" width="150" height="50" rx="6" fill="url(#warnGrad)" opacity="0.9"/>
  <text x="640" y="295" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11" font-weight="bold">PENDING: 34</text>
  <text x="640" y="312" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="9">events never cleared</text>
  <text x="640" y="348" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="10" opacity="0.7">"Why won't these sync?!"</text>

  <!-- Arrows between them showing the mismatch -->
  <!-- Arrow 1: EventsProcessed -> ProcessedEventIds (MISMATCH) -->
  <line x1="270" y1="165" x2="530" y2="165" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
  <text x="400" y="158" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="9" font-weight="bold">MISMATCH</text>

  <!-- Arrow 2: UpdatedWorkOrders -> WorkOrders (MISMATCH) -->
  <line x1="270" y1="185" x2="530" y2="185" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
  <text x="400" y="198" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="9" font-weight="bold">MISMATCH</text>

  <!-- Arrow 3: SyncTimestamp -> ServerTime (MISMATCH) -->
  <line x1="270" y1="205" x2="530" y2="205" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
  <text x="400" y="218" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="9" font-weight="bold">MISMATCH</text>

  <!-- Arrow 4: FailedEventIds (dropped) -->
  <line x1="270" y1="225" x2="400" y2="225" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="340" y="238" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="8" opacity="0.6">dropped</text>

  <!-- Arrow 5: Success (ignored) -->
  <line x1="270" y1="245" x2="400" y2="245" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="340" y="258" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="8" opacity="0.6">ignored</text>

  <!-- JSON deserializer in the middle -->
  <rect x="355" y="268" width="90" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="400" y="288" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">System.</text>
  <text x="400" y="301" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">Text.Json</text>
  <text x="400" y="332" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8" font-style="italic">*shrugs*</text>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="18" font-weight="bold">The Bug That 200 OK Couldn't Hide</text>
  <text x="400" y="58" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">when every call succeeds and nothing works</text>

  <!-- Bottom tagline -->
  <text x="400" y="425" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">the AI found it in 30 seconds — after the architect said where to look</text>
</svg>
